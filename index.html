<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026世界杯 · 每日投注报告</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#f0ede8;color:#1a1a1a;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:40px 20px;
  }
  .header{
    text-align:center;margin-bottom:40px;
  }
  .header h1{
    font-size:28px;font-weight:800;
    background:linear-gradient(135deg,#1a5fa8,#0d4e9e);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }
  .header .sub{
    font-size:14px;color:#888;margin-top:8px;
  }
  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:16px;
    max-width:920px;width:100%;
  }
  .day-card{
    background:#fff;
    border-radius:12px;
    border:1px solid #ddd;
    padding:20px;
    text-decoration:none;
    color:inherit;
    transition:all .2s;
    display:flex;flex-direction:column;gap:8px;
    position:relative;overflow:hidden;
  }
  .day-card:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 25px rgba(0,0,0,.1);
    border-color:#1a5fa8;
  }
  .day-card .date-big{
    font-size:32px;font-weight:800;color:#1a5fa8;
    line-height:1;
  }
  .day-card .date-label{
    font-size:12px;color:#888;
  }
  .day-card .match-count{
    font-size:13px;color:#555;
    margin-top:4px;
    padding-top:10px;
    border-top:1px solid #f0ede8;
  }
  .day-card .arrow{
    position:absolute;right:16px;top:50%;transform:translateY(-50%);
    font-size:20px;color:#ccc;transition:color .2s;
  }
  .day-card:hover .arrow{color:#1a5fa8;}
  .day-card.disabled{
    opacity:.45;pointer-events:none;
    background:#f8f7f4;
  }
  .day-card.disabled .date-big{color:#aaa;}
  .day-card .badge{
    display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;
    background:#e8f4ff;color:#0d4e9e;
  }
  .footer{
    margin-top:40px;font-size:11px;color:#aaa;text-align:center;
  }
</style>
</head>
<body>
