name: Daily World Cup Report

on:
  schedule:
    # 12:05 Beijing time. The generator uses Asia/Shanghai and defaults to tomorrow.
    - cron: "5 4 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date, for example 2026-06-18. Leave empty for tomorrow Beijing time."
        required: false
        default: ""

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report and index
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: python scripts/generate_daily.py

      - name: Commit generated files
        run: |
          git config user.name "World Cup Bot"
          git config user.email "bot@worldcup.local"
          git add index.html reports .nojekyll
          if git diff --staged --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Auto: update daily report"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
